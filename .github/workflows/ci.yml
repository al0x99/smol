name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (macOS)
    # smol targets macOS 26 (Tahoe) and uses FoundationModels, so the
    # runner needs Xcode 26+. Pin once GitHub publishes a stable image
    # for it; until then macos-latest gives us the newest Xcode available.
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Select latest Xcode 26 if installed
        run: |
          if ls /Applications | grep -q '^Xcode_26'; then
            sudo xcode-select -s "/Applications/$(ls /Applications | grep '^Xcode_26' | sort -V | tail -1)/Contents/Developer"
            xcodebuild -version
          fi

      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild \
            -project smol.xcodeproj \
            -scheme smol \
            -configuration Debug \
            -derivedDataPath build/ci \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build \
          | tee build.log

      - name: Fail on new warnings
        run: |
          # Surface every Swift/Clang warning, drop the harmless AppIntents one.
          if grep -E 'warning:|error:' build.log \
              | grep -v appintentsmetadataprocessor \
              | grep -v '^$'; then
            echo "::error::Build produced warnings or errors"
            exit 1
          fi

      - name: Detect runner macOS version
        id: macos
        run: |
          major=$(sw_vers -productVersion | cut -d. -f1)
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "Runner macOS major version: $major"

      # The smol target (and therefore smolTests' TEST_HOST) is pinned to
      # macOS 26.2 because the app uses FoundationModels, which is Tahoe-
      # only. Tests cross-compile against the macOS 26 SDK from the build
      # step above, but actually loading the test bundle requires a
      # runtime that meets the deployment target. GitHub's hosted runners
      # are still on macOS 15 as of mid-2026, so skip the test step until
      # macos-26 ships and pin the version above when it does.
      - name: Run unit tests
        if: steps.macos.outputs.major >= '26'
        run: |
          set -o pipefail
          xcodebuild \
            -project smol.xcodeproj \
            -scheme smol \
            -configuration Debug \
            -derivedDataPath build/ci \
            -only-testing:smolTests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            test

      - name: Skip tests — runner macOS too old
        if: steps.macos.outputs.major < '26'
        run: |
          echo "::warning::Skipping smolTests on macOS ${{ steps.macos.outputs.major }}.x — the test host requires macOS 26 (Tahoe). Run tests locally with: xcodebuild -project smol.xcodeproj -scheme smol test"
